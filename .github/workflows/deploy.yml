name: Build and deploy

# Manual-only by design: merges never auto-deploy. Publishing is always a
# deliberate action — run this workflow with target=production to deploy. That
# covers both code changes and picking up new content from Contentful (which is
# fetched at build time). Optional future automation: repository_dispatch + a
# Contentful publish webhook.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Where to deploy"
        type: choice
        default: staging
        options:
          - staging      # -> s3://maxharding4.com/_staging/ (safe dry-run, no invalidation)
          - production   # -> s3://maxharding4.com/ (LIVE)
      prune:
        description: "Delete bucket files not in this build (--delete). Leave OFF for normal deploys; turn ON to clean up orphaned files."
        type: boolean
        default: false

# Never run two production deploys at once; a newer run supersedes an older one.
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    # Only ever deploy from the live repo — guards against this workflow running
    # in the placeholder/source repo or a fork.
    if: github.repository == 'maxharding4/maxharding4'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://maxharding4.com
    env:
      S3_BUCKET: maxharding4.com
      CLOUDFRONT_DISTRIBUTION_ID: E18D7W5LICE64E
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ inputs.target }}" = "production" ]; then
            echo "dest=s3://${S3_BUCKET}" >> "$GITHUB_OUTPUT"
            echo "invalidate=true" >> "$GITHUB_OUTPUT"
          else
            echo "dest=s3://${S3_BUCKET}/_staging" >> "$GITHUB_OUTPUT"
            echo "invalidate=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ inputs.prune }}" = "true" ]; then
            echo "delete=--delete" >> "$GITHUB_OUTPUT"
          else
            echo "delete=" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync static export to S3
        run: |
          echo "Syncing ./out -> ${{ steps.target.outputs.dest }} ${{ steps.target.outputs.delete }}"
          aws s3 sync ./out "${{ steps.target.outputs.dest }}" ${{ steps.target.outputs.delete }}

      - name: Invalidate CloudFront cache
        if: steps.target.outputs.invalidate == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
